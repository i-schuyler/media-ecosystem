name: Bug
description: Report incorrect or unsafe behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true

  - type: dropdown
    id: data_risk
    attributes:
      label: Data-loss or identity risk
      options:
        - None known
        - Possible
        - Confirmed
    validations:
      required: true

  - type: textarea
    id: sanitized
    attributes:
      label: Sanitized diagnostics
      description: Do not include credentials, real library data, or personal paths.
